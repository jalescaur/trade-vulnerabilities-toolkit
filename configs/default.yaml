# configs/default.yaml
# -------------------
# Configuração ajustada para ler a coluna 'period' como Ano.

project:
  name: "ai-infrastructure-trade"
  basket_name: "ai_basket_v01"
  basket_version: "v0.1"
  description: "Pipeline ajustado para normalização de dados Comtrade."

inputs:
  raw_root: "data/raw"
  discovery_mode: "hs6_folders"
  csv_sep: ","   # Garante separador por vírgula
  glob: "*.csv"

  csv_encoding: "utf-8"
  csv_encoding_fallbacks:
    - "utf-8-sig"
    - "cp1252"
    - "latin1"

basket:
  hs6:
    - "841582"
    - "847150"
    - "847170"
    - "850440"
    - "851762"
    - "854231"
    - "854232"
    - "854239"
    - "854470"

schema:
  # CORREÇÃO CRÍTICA AQUI:
  # Mapeamos 'period' para 'year' porque o log mostrou que refYear estava pegando valor errado.
  rename_map:
    period: "year"             # <--- MUDANÇA: period agora é a coluna oficial de ano
    refYear: "refYear_raw"     # Guardamos o original só por segurança
    reporterISO: "reporter"
    reporterDesc: "reporter_name_raw"
    partnerISO: "partner"
    partnerDesc: "partner_name_raw"
    flowDesc: "flow"
    cmdCode: "hs6"
    primaryValue: "value"

  required_columns:
    - "year"
    - "reporter"
    - "partner"
    - "hs6"
    - "value"

filters:
  year_min: 2021
  year_max: 2024
  value_positive_only: true

outputs:
  processed_root: "data/processed"
  intermediate_dataset_name: "aiinfra_v01.parquet"
  exploratory_excels_dir: "data/processed/exploratory_excels"
  logs_dir: "outputs/logs"